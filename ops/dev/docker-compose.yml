services:
  runtime:
    build:
      context: ../../
      dockerfile: ./ops/services/runtime/Dockerfile
      target: development
    image: ${COMPOSE_PROJECT_NAME}_runtime:dev
    command: npm run dev
    init: true
    tty: true
    restart: unless-stopped
    environment:
      CHOKIDAR_INTERVAL: '250'
      CHOKIDAR_USEPOLLING: 'true'
      CLIENT_CONFIG_PATH: /etc/dota2-coach/clients.yaml
      CLIENT_CREDENTIALS_PATH: /run/secrets/dota2-coach/client-credentials.yaml
      HOST: 0.0.0.0
      LOG_LEVEL: ${RUNTIME_LOG_LEVEL:-info}
      PORT: 3000
    ports:
      - '${RUNTIME_PORT:-3000}:3000'
    volumes:
      - ../../apps/runtime:/app
      - runtime_node_modules:/app/node_modules
      - ./config/runtime/clients.yaml:/etc/dota2-coach/clients.yaml:ro
      - ./secrets/runtime/client-credentials.local.yaml:/run/secrets/dota2-coach/client-credentials.yaml:ro
    healthcheck:
      test: >-
        node -e "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  runtime_node_modules:
