services:
  runtime:
    build:
      context: ../../
      dockerfile: ./ops/services/runtime/Dockerfile
      target: development
    image: ${COMPOSE_PROJECT_NAME}_runtime:dev
    command: npm run dev
    init: true
    tty: true
    restart: unless-stopped
    environment:
      CHOKIDAR_INTERVAL: '250'
      CHOKIDAR_USEPOLLING: 'true'
      CLIENT_CONFIG_PATH: /etc/dota2-coach/clients.yaml
      CLIENT_CREDENTIALS_PATH: /run/secrets/dota2-coach/client-credentials.local.yaml
      COACH_LOCALE: ru
      DISCORD_CONFIG_PATH: /etc/dota2-coach/discord.yaml
      DISCORD_CREDENTIALS_PATH:
      DISCORD_CREATE_PANEL: ${DISCORD_CREATE_PANEL:-false}
      GSI_FRESHNESS_MS: 5000
      HOST: 0.0.0.0
      LOG_LEVEL: ${RUNTIME_LOG_LEVEL:-info}
      LOST_CONSOLE_DEBUG_ENABLED: ${LOST_CONSOLE_DEBUG_ENABLED:-false}
      LOST_POLICY_PATH: /etc/dota2-coach/lost-policy.yaml
      PORT: 3000
    ports:
      - '${RUNTIME_PORT:-3000}:3000'
    volumes:
      - ../../apps/runtime:/app
      - runtime_node_modules:/app/node_modules
      - ./config/runtime/clients.yaml:/etc/dota2-coach/clients.yaml:ro
      - ./config/runtime/discord.yaml:/etc/dota2-coach/discord.yaml:ro
      - ./config/runtime/lost-policy.yaml:/etc/dota2-coach/lost-policy.yaml:ro
      - ./secrets/runtime:/run/secrets/dota2-coach:ro
    healthcheck:
      test: >-
        node -e "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  tts:
    build:
      context: ../../
      dockerfile: ./ops/services/tts/Dockerfile
      target: development
    image: ${COMPOSE_PROJECT_NAME}_tts:dev
    command: python -m tts_service.main
    init: true
    restart: unless-stopped
    environment:
      TTS_CONFIG_PATH: /etc/dota2-coach/tts.yaml
    expose:
      - '8080'
    volumes:
      - ../../apps/tts:/app
      - ./config/tts/tts.yaml:/etc/dota2-coach/tts.yaml:ro
    healthcheck:
      test: >-
        python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/ready', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 60s

  tts-test:
    profiles:
      - test
    build:
      context: ../../
      dockerfile: ./ops/services/tts/Dockerfile
      target: test
    image: ${COMPOSE_PROJECT_NAME}_tts:test
    init: true
    network_mode: none

volumes:
  runtime_node_modules:
